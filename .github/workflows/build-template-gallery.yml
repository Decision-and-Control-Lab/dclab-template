name: Build LaTeX template gallery

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install TeX and gallery tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            latexmk \
            poppler-utils \
            zip \
            biber \
            xindy \
            texlive-bibtex-extra \
            texlive-fonts-extra \
            texlive-fonts-recommended \
            texlive-lang-italian \
            texlive-latex-extra \
            texlive-latex-recommended \
            texlive-luatex \
            texlive-pictures \
            texlive-science \
            texlive-xetex

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Build PDFs, previews, ZIP archives and gallery
        env:
          # Optional repository variable; gallery.yml remains the documented fallback.
          GALLERY_BASE_URL: ${{ vars.GALLERY_BASE_URL }}
          GALLERY_GITHUB_REPOSITORY: ${{ vars.GALLERY_GITHUB_REPOSITORY }}
          GALLERY_GITHUB_BRANCH: ${{ vars.GALLERY_GITHUB_BRANCH }}
        run: python scripts/build_gallery.py

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload complete site
        uses: actions/upload-pages-artifact@v3
        with:
          # Publish the whole checkout so an existing HTML site is preserved.
          path: .

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
